<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="description" content="Contact page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
	<h1>Contact Me</h1> </header>
	<nav>
        <span class="logo">Lee May Yan</span>
		<ul>
		<li><a href="index.html">Home</a></li>
		<li><a href="about.html">About</a></li>
		<li><a href="skills.html">Skills</a></li>
		<li><a href="academic.html">Academic</a></li>
		<li><a href="projects.html">Projects</a></li>
		<li><a href="contact.html" class="active">Contact</a></li>
	</ul>
	</nav>

    <main>
	<form action="#" method="post">
        
            <p>
                <label for="fullname">Full Name:</label><br>
                <input type="text" id="fullname" name="fullname"
                    placeholder="Enter your full name"
                    required maxlength="60">
            </p>

            <p>
                <label for="email">Email Address:</label><br>
                <input 
                    type="email" id="email" name="email"
                    placeholder="example@email.com"
                    required maxlength="50">
            </p>

            <p>
                <label for="phone">Phone Number:</label><br>
                <input 
                    type="tel" id="phone" name="phone"
                    placeholder="012-3456789"
                    maxlength="15"
                    required>
            </p>

            <p>
                <label for="age">Age:</label><br>
                <input type="number" id="age" name="age"
                    min="18" max="100"
                    placeholder="Enter your age"
                    required>
            </p>

            <p>
                <label for="date">Preferred Contact Date:</label><br>
                <input 
                    type="date" id="date" name="date"
                    required>
            </p>

            <p>
                <label for="satisfaction">How interested are you in my portfolio? (1-10)</label><br>
                <input type="range" id="satisfaction" name="satisfaction"
                    min="1" max="10">
            </p>

            <p>
                <label for="subject">Subject:</label><br>
                <select id="subject" name="subject"
                    required>
                    <optgroup label="General">
                        <option value="feedback">Feedback</option>
                        <option value="question">Question</option>
                    </optgroup>
                    <optgroup label="Project Related">
                        <option value="collaboration">Collaboration</option>
                        <option value="project-inquiry">Project Inquiry</option>
                    </optgroup>
                </select>
            </p>

            <p>Services Interested In:</p>
            <input type="checkbox" id="webdesign" name="services" value="webdesign">
            <label for="webdesign">Web Design</label><br>

            <input type="checkbox" id="uidesign" name="services" value="uidesign">
            <label for="uidesign">UI Design</label><br>

            <input type="checkbox" id="programming" name="services" value="programming">
            <label for="programming">Programming Help</label><br><br>

            <p>Preferred Contact Method:</p>
            <input type="radio" id="contact-email" name="contact_method" value="email" required>
            <label for="contact-email">Email</label><br>

            <input type="radio" id="contact-phone" name="contact_method" value="phone">
            <label for="contact-phone">Phone</label><br>

            <input type="radio" id="contact-whatsapp" name="contact_method" value="whatsapp">
            <label for="contact-whatsapp">WhatsApp</label><br><br>

            <p>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="40"
                    placeholder="Write your message here"
                    maxlength="300"
                    required></textarea>
            </p>

            <p>
                <button type="submit">
                    Submit
                </button>
                <button type="reset" >
                    Reset
                </button>
            </p>
        </form>
    </main>

	
</body>
</html>
